# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.dev.yml  —  Local development (no Nginx, ports exposed directly)
# Usage: docker-compose -f docker-compose.dev.yml up
# ─────────────────────────────────────────────────────────────────────────────
version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: platedetect_mongo_dev
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: devpassword
      MONGO_INITDB_DATABASE: vehicle_detection
    volumes:
      - mongo_dev_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - platedetect_dev

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: platedetect_backend_dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      API_VERSION: v1
      MONGODB_URI_PROD: mongodb://admin:devpassword@mongo:27017/vehicle_detection?authSource=admin
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      JWT_SECRET: dev_jwt_secret_not_for_production_use
      JWT_EXPIRE: 30d
      JWT_COOKIE_EXPIRE: 30
      REFRESH_TOKEN_SECRET: dev_refresh_secret_not_for_production_use
      REFRESH_TOKEN_EXPIRE: 90d
      CORS_ORIGIN: http://localhost:3000
      FRONTEND_URL: http://localhost:3000
      LOG_LEVEL: debug
      MAX_FILE_SIZE: 10485760
      RATE_LIMIT_MAX: 1000
      AUTH_RATE_LIMIT_MAX: 50
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_dev_data:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - platedetect_dev
    command: ["node", "server.js"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api/v1
        REACT_APP_SOCKET_URL: http://localhost:5000
    container_name: platedetect_frontend_dev
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - platedetect_dev

volumes:
  mongo_dev_data:
  uploads_dev_data:

networks:
  platedetect_dev:
    driver: bridge
