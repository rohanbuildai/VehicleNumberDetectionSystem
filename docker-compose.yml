version: '3.9'

services:
  # MongoDB
  mongo:
    image: mongo:7.0
    container_name: platedetect_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-securepassword123}
      MONGO_INITDB_DATABASE: vehicle_detection
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - platedetect_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: platedetect_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      API_VERSION: v1
      MONGODB_URI_PROD: mongodb://admin:${MONGO_ROOT_PASSWORD:-securepassword123}@mongo:27017/vehicle_detection?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 30d
      JWT_COOKIE_EXPIRE: 30
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      REFRESH_TOKEN_EXPIRE: 90d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@platedetect.ai}
      FROM_NAME: ${FROM_NAME:-PlateDetect AI}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      PLATERECOGNIZER_API_URL: ${PLATERECOGNIZER_API_URL:-}
      PLATERECOGNIZER_TOKEN: ${PLATERECOGNIZER_TOKEN:-}
      MAX_FILE_SIZE: 10485760
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      AUTH_RATE_LIMIT_MAX: 5
      LOG_LEVEL: info
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - platedetect_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api/v1}
        REACT_APP_SOCKET_URL: ${REACT_APP_SOCKET_URL:-}
    container_name: platedetect_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - platedetect_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.25-alpine
    container_name: platedetect_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend
    networks:
      - platedetect_network

volumes:
  mongo_data:
  uploads_data:
  logs_data:

networks:
  platedetect_network:
    driver: bridge
